name: build_and_deploy_portfolio_app
run-name: ${{github.actor}} builds and deploys portfolio app to github pages
on: 
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4                                          

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'                                                 
  
      - name: Install and Build                                              
        run: |  
          npm install                                                      
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
  
  deploy:
    needs: build
    permissions:
      pages: write      # to deploy to Pages
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
 
